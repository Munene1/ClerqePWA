workflows:
  build-android:
    name: Build Android APK
    max_build_duration: 30
    environment:
      node: 22
      java: 21
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - npm ci
      - npm run build
      - npx cap sync android
      - |
        VERSION=$(node -e "console.log(require('./package.json').version)")
        VERSION_CODE=${PROJECT_BUILD_NUMBER:-$(node -e "const d=new Date(); console.log(d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate())")}
        cd android && ./gradlew assembleDebug -PversionCode=$VERSION_CODE -PversionName=$VERSION
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
      - android/app/build/outputs/apk/release/*.apk
